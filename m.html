<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <title>My Princess Jaahido</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap');

        body {
            margin: 0;
            background: black;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Qoraalka weyn ee dhexda */
        .title {
            font-family: 'Dancing Script', cursive;
            color: #ff0055;
            font-size: 4rem;
            font-weight: bold;
            z-index: 100;
            text-shadow: 0 0 20px #ff0055, 0 0 40px #ff0055;
            text-align: center;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* Qoraallada soconaya (Background) */
        .scrolling-text {
            position: absolute;
            color: rgba(255, 20, 147, 0.3);
            white-space: nowrap;
            font-weight: bold;
            pointer-events: none;
            animation: move linear infinite;
        }

        @keyframes move {
            from { transform: translateX(100vw); }
            to { transform: translateX(-100%); }
        }

        /* Sawirrada dhacaya */
        .falling-img {
            position: absolute;
            width: 90px;
            height: 110px;
            object-fit: cover;
            border-radius: 12px;
            border: 2px solid white;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
            z-index: 50;
            animation: fall linear infinite;
        }

        /* Wadnaha dhacaya */
        .heart {
            position: absolute;
            color: red;
            z-index: 40;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-120px) rotate(0deg); }
            100% { transform: translateY(100vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="title">I Love You More Jaahido ❤️</div>

    <script>
        // Saddexdaada Link halkan ayaan ku wada daray
        const myImages = [
            "https://i.ibb.co/1fSJvQfp/IMG-0805-Original.jpg",
            "https://i.ibb.co/RTTgHHmn/temp-image-DCB77-EFE-7-D37-4080-A7-DA-665-AC85427-E9.jpg",
            "https://i.ibb.co/4RcRV7n0/IMG-1043.jpg"
        ];

        const msgs = ["Love you more Jaahido", "Much my baby girl", "I love you so much", "My Princess Jaahido"];

        // Qoraallada soconaya
        for (let i = 0; i < 45; i++) {
            let div = document.createElement('div');
            div.className = 'scrolling-text';
            div.innerText = msgs[Math.floor(Math.random() * msgs.length)];
            div.style.top = Math.random() * 100 + "vh";
            div.style.fontSize = (Math.random() * 22 + 14) + "px";
            div.style.animationDuration = (Math.random() * 9 + 5) + "s";
            div.style.opacity = Math.random();
            document.body.appendChild(div);
        }

        // Sawirrada dhacaya (Randomly pick one of the three)
        setInterval(() => {
            let img = document.createElement('img');
            img.src = myImages[Math.floor(Math.random() * myImages.length)];
            img.className = 'falling-img';
            img.style.left = Math.random() * 85 + "vw";
            img.style.animationDuration = (Math.random() * 3 + 4) + "s";
            document.body.appendChild(img);
            setTimeout(() => img.remove(), 7000);
        }, 1500);

        // Wadnaha dhacaya
        setInterval(() => {
            let h = document.createElement('div');
            h.className = 'heart';
            h.innerHTML = '❤️';
            h.style.left = Math.random() * 100 + "vw";
            h.style.fontSize = Math.random() * 18 + 12 + "px";
            h.style.animationDuration = (Math.random() * 3 + 2) + "s";
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 4500);
        }, 300);
    </script>
</body>
</html>
